<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotePad | Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <main class="container my-4">
        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <div class="d-flex flex-wrap gap-2 align-items-center justify-content-center justify-content-md-start">

                    <div class="btn-group">
                        <button onclick="f1()" class="btn btn-outline-secondary rounded-circle ms-1"
                            title="Bold"><b>B</b></button>
                        <button onclick="f2()" class="btn btn-outline-secondary rounded-circle ms-1"
                            title="Italic"><i>I</i></button>
                    </div>

                    <div class="btn-group border-start ps-2">
                        <button onclick="f3()" class="btn btn-outline-secondary"><i
                                class="fas fa-align-left"></i></button>
                        <button onclick="f4()" class="btn btn-outline-secondary"><i
                                class="fas fa-align-center"></i></button>
                        <button onclick="f5()" class="btn btn-outline-secondary"><i
                                class="fas fa-align-right"></i></button>
                    </div>

                    <div class="btn-group border-start ps-2">
                        <button onclick="f6()" class="btn btn-sm btn-outline-dark">AB</button>
                        <button onclick="f7()" class="btn btn-sm btn-outline-dark">ab</button>
                        <button onclick="f8()" class="btn btn-sm btn-outline-dark">Ab</button>
                    </div>

                    <div class="d-flex align-items-center border-start ps-2 gap-2">
                        <button onclick="f9()" class="btn btn-outline-danger btn-sm" title="Clear"><i
                                class="fas fa-eraser"></i></button>
                        <input type="color" id="colorPicker" onchange="changeColor()"
                            class="form-control form-control-color p-1" title="Color">
                        <label for="fileInput" class="btn btn-outline-primary btn-sm mb-0">
                            <i class="fas fa-upload"></i>
                            <input type="file" id="fileInput" accept=".txt" hidden>
                        </label>
                    </div>

                    <div class="btn-group border-start ps-2">
                        <button type="button" id="darkModeToggle"
                            class="btn btn-outline-secondary d-flex align-items-center justify-content-center"
                            title="Toggle Dark Mode" style="width: 40px; height: 40px; border-radius: 50%;">
                            <i class="fas fa-moon" id="themeIcon"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="card-body p-0">
                <textarea id="textarea1" class="form-control border-0 rounded-0 p-4" rows="15"
                    placeholder="Start typing..."></textarea>
            </div>

            <div class="card-footer bg-white py-3">
                <div class="row g-3 align-items-center">
                    <div class="col-md-6">
                        <div class="input-group">
                            <input type="text" id="filename" class="form-control" placeholder="filename.txt">
                            <button id="save-button" class="btn btn-primary">Save File</button>
                        </div>
                    </div>
                    <div class="col-md-6 text-center text-md-end">
                        <button class="btn btn-link text-decoration-none p-0">
                            <a id="download-link" style="display: none" download>Download Ready</a>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-4 text-center text-muted border-top bg-white">
        <small class="fst-italic">"When in doubt, edit it out."</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
